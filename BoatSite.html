<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>MVSK – Båtkjørerside</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1E3D;--navy-mid:#162F5A;--blue:#1A73E8;--blue-l:#4DA3FF;
  --aqua:#00C9B1;--sky:#EBF4FD;--sky-m:#C8E2F8;--white:#fff;--bg:#F4F7FB;
  --txt:#0D1B2A;--txt-m:#3D5166;--txt-s:#7B95AE;--bdr:#D6E6F5;
  --gold:#F5A623;--red:#E8445A;--green:#1EC87A;--purple:#7C3AED;
  --r:16px;--rs:10px;--sh:0 2px 14px rgba(11,30,61,.08);--shm:0 6px 28px rgba(11,30,61,.14);--t:.2s ease;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{background:var(--navy);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-ico{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--aqua));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.hdr-t strong{display:block;font-size:13px;font-weight:700;color:#fff}
.hdr-t span{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.07em}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-btn{padding:7px 14px;border-radius:var(--rs);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all var(--t);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.hdr-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.hdr-driver-pill{display:flex;align-items:center;gap:8px;background:rgba(30,200,122,.15);border:1px solid rgba(30,200,122,.35);border-radius:30px;padding:5px 14px 5px 8px;cursor:pointer}
.hdr-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.hdr-dname{font-size:12.5px;font-weight:700;color:#fff}

/* STEPS */
.step{padding:24px 16px;flex:1;max-width:640px;margin:0 auto;width:100%}

/* DRIVER SELECT */
.step-title{font-size:22px;font-weight:800;color:var(--txt);margin-bottom:6px}
.step-sub{font-size:14px;color:var(--txt-s);margin-bottom:24px}
.driver-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.driver-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 14px;background:var(--white);border:2px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all var(--t);user-select:none;box-shadow:var(--sh)}
.driver-card:hover,.driver-card:active{border-color:var(--blue);background:var(--sky);transform:translateY(-2px);box-shadow:var(--shm)}
.driver-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.driver-name{font-size:14px;font-weight:700;color:var(--txt);text-align:center;line-height:1.3}

/* LOGIN */
.login-card{background:var(--white);border:1.5px solid var(--bdr);border-radius:var(--r);padding:32px 28px;box-shadow:var(--sh);text-align:center}
.login-av-big{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 16px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.login-name{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--txt-s);margin-bottom:24px}
.pw-input{border:2px solid var(--bdr);border-radius:var(--rs);padding:13px 16px;font-family:'Outfit',sans-serif;font-size:18px;width:100%;text-align:center;letter-spacing:.12em;color:var(--txt);outline:none;transition:border-color var(--t);margin-bottom:8px}
.pw-input:focus{border-color:var(--blue)}
.pw-err{font-size:13px;color:var(--red);font-weight:600;min-height:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 22px;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all var(--t);user-select:none;line-height:1;flex:1}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:#0D5CC5;transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,115,232,.35)}
.btn-p:active{transform:translateY(0);box-shadow:none}
.btn-o{background:none;color:var(--txt-m);border:2px solid var(--bdr)}
.btn-o:hover{border-color:var(--blue);color:var(--blue);background:var(--sky)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#c73048;transform:translateY(-1px)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#16a865;transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#d48a10;transform:translateY(-1px)}

/* QUEUE VIEW */
.sjø-tabs{display:flex;gap:0;background:var(--white);border:1.5px solid var(--bdr);border-radius:var(--r);padding:4px;margin-bottom:20px;overflow:hidden}
.sjø-tab{flex:1;padding:10px 8px;text-align:center;border-radius:var(--rs);font-size:13.5px;font-weight:600;color:var(--txt-s);cursor:pointer;transition:all var(--t);user-select:none;position:relative}
.sjø-tab:hover{color:var(--txt);background:var(--sky)}
.sjø-tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,115,232,.3)}
.sjø-tab .cnt-badge{display:inline-block;background:rgba(255,255,255,.3);color:inherit;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:5px}
.sjø-tab:not(.active) .cnt-badge{background:var(--sky-m);color:var(--txt-s)}

.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-header h2{font-size:18px;font-weight:800;color:var(--txt)}
.q-header span{font-size:13px;color:var(--txt-s)}

.q-item{background:var(--white);border:2px solid var(--bdr);border-radius:var(--r);padding:16px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all var(--t);box-shadow:var(--sh);user-select:none}
.q-item:hover,.q-item:active{border-color:var(--blue);background:var(--sky);transform:translateX(3px);box-shadow:var(--shm)}
.q-num{width:36px;height:36px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--navy-mid);flex-shrink:0}
.q-num.first{background:var(--gold);color:#fff}
.q-info{flex:1}
.q-name{font-size:15px;font-weight:700;color:var(--txt)}
.q-meta{font-size:12.5px;color:var(--txt-s);margin-top:2px}
.q-disc{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:700}
.q-disc.slalom{background:rgba(26,115,232,.1);color:var(--blue)}
.q-disc.trick{background:rgba(124,58,237,.1);color:var(--purple)}
.q-disc.hopp{background:rgba(245,166,35,.1);color:var(--gold)}
.q-disc.wakeboard{background:rgba(0,201,177,.1);color:var(--aqua)}
.q-disc.annet{background:var(--sky);color:var(--txt-s)}
.q-arrow{color:var(--txt-s);font-size:18px}

.q-empty{text-align:center;padding:48px 20px;color:var(--txt-s);background:var(--white);border:2px dashed var(--bdr);border-radius:var(--r)}
.q-empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.25}
.q-empty strong{display:block;font-size:16px;font-weight:700;color:var(--txt-m);margin-bottom:6px}

/* CONFIRM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(11,30,61,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:var(--r);padding:28px 24px;max-width:380px;width:100%;box-shadow:var(--shm);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:18px;font-weight:800;color:var(--txt);margin-bottom:6px}
.modal-sub{font-size:14px;color:var(--txt-s);margin-bottom:20px}
.rider-preview{background:var(--sky);border-radius:var(--rs);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.rider-ico{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}

/* ACTIVE TRIP */
.trip-card{background:var(--white);border-radius:var(--r);padding:28px 24px;box-shadow:var(--shm);text-align:center;border:2px solid var(--bdr)}
.trip-rider-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--aqua));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 12px}
.trip-name{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:4px}
.trip-meta{font-size:14px;color:var(--txt-s);margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:8px}

.timer-display{font-family:'JetBrains Mono',monospace;font-size:62px;font-weight:700;color:var(--navy);letter-spacing:.02em;line-height:1;margin-bottom:8px;transition:color var(--t)}
.timer-display.paused{color:var(--gold)}
.timer-display.running{color:var(--navy)}
.timer-state{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:28px;height:20px;display:flex;align-items:center;justify-content:center;gap:6px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.2s ease infinite}
.pause-dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}

.trip-btns{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.trip-btns .btn{font-size:16px;padding:14px 24px;flex:none}

.trip-info-row{display:flex;gap:10px;justify-content:center}
.trip-info-chip{background:var(--sky);border:1px solid var(--sky-m);border-radius:var(--rs);padding:8px 16px;font-size:13px;color:var(--txt-m);font-weight:600;display:flex;align-items:center;gap:6px}

.end-confirm{background:rgba(232,68,90,.06);border:2px solid rgba(232,68,90,.2);border-radius:var(--r);padding:20px;margin-top:20px;text-align:center}
.end-confirm p{font-size:14px;color:var(--txt-m);margin-bottom:14px}
.end-confirm .btn-row{max-width:300px;margin:0 auto}

/* DONE OVERLAY */
.done-screen{text-align:center;padding:48px 24px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh)}
.done-circle{width:80px;height:80px;border-radius:50%;background:rgba(30,200,122,.12);border:2px solid rgba(30,200,122,.4);display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--green);margin:0 auto 18px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:var(--shm)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.toast.info{background:var(--navy)}

@media(max-width:480px){
  .driver-grid{grid-template-columns:1fr 1fr}
  .timer-display{font-size:48px}
  .trip-btns .btn{padding:13px 16px;font-size:14px}
}
</style>
</head>
<body>

<header class="hdr">
  <a href="MVSK_main.html" class="hdr-brand">
    <div class="hdr-ico"><i class="fa-solid fa-water"></i></div>
    <div class="hdr-t"><strong>MVSK</strong><span>Båtkjørerside</span></div>
  </a>
  <div class="hdr-r" id="hdrRight">
    <a href="MVSK_main.html" class="hdr-btn"><i class="fa-solid fa-arrow-left"></i> Hjem</a>
  </div>
</header>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ── SHARED STATE VIA LOCALSTORAGE ── */
const LS = 'MVSK_data';
function getLS(){try{return JSON.parse(localStorage.getItem(LS))||defLS()}catch{return defLS()}}
function defLS(){return{queues:{'1':[],'2':[],'3':[]},completedTrips:[]}}
function setLS(d){localStorage.setItem(LS,JSON.stringify(d))}
function saveQueue(sjø,arr){const d=getLS();d.queues[String(sjø)]=arr;setLS(d);}
function addCompletedTrip(trip){const d=getLS();d.completedTrips.unshift(trip);setLS(d);}

/* ── DRIVERS ── */
const DRIVERS=[
  {id:1,name:'Tobias SJ',initials:'TSJ',pw:'PRØVE',color:'#1A73E8'},
  
];

/* ── APP STATE ── */
const A={
  step:'select',       // select | login | queue | trip | done
  driver:null,
  selectedSjø:1,
  activeRider:null,
  confirmRider:null,   // rider waiting for start confirmation
  tripStart:null,
  paused:false,
  pauseStart:null,
  pausedMs:0,
  timer:null,
  elapsedMs:0,
  showEndConfirm:false,
};

/* ── ROUTER ── */
function go(step,extra={}){
  Object.assign(A,{step,...extra});
  bRender();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── RENDER ── */
function bRender(){
  const app=document.getElementById('app');
  updateHdr();
  if(A.step==='select')  app.innerHTML=renderSelect();
  else if(A.step==='login')  app.innerHTML=renderLogin();
  else if(A.step==='queue')  app.innerHTML=renderQueue();
  else if(A.step==='trip')   app.innerHTML=renderTrip();
  else if(A.step==='done')   app.innerHTML=renderDone();
  afterRender();
}

function updateHdr(){
  const r=document.getElementById('hdrRight');
  if(A.driver&&A.step!=='select'&&A.step!=='login'){
    r.innerHTML=`
      <div class="hdr-driver-pill" onclick="confirmLogout()">
        <div class="hdr-av" style="background:${A.driver.color}">${A.driver.initials}</div>
        <div class="hdr-dname">${A.driver.name.split(' ')[0]}</div>
        <i class="fa-solid fa-right-from-bracket" style="font-size:11px;color:rgba(255,255,255,.5);margin-left:2px"></i>
      </div>`;
  } else {
    r.innerHTML=`<a href="MVSK_main.html" class="hdr-btn"><i class="fa-solid fa-arrow-left"></i> Hjem</a>`;
  }
}

/* ── DRIVER SELECT ── */
function renderSelect(){
  return`<div class="step">
    <div class="step-title">Hvem kjører båten? 🚤</div>
    <div class="step-sub">Velg ditt navn og logg inn med passordet ditt</div>
    <div class="driver-grid">
      ${DRIVERS.map(d=>`
      <div class="driver-card" onclick="selectDriver(${d.id})">
        <div class="driver-av" style="background:${d.color}">${d.initials}</div>
        <div class="driver-name">${d.name}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function selectDriver(id){
  A.driver=DRIVERS.find(d=>d.id===id);
  go('login');
  setTimeout(()=>document.getElementById('pwInput')?.focus(),100);
}

/* ── LOGIN ── */
function renderLogin(){
  const d=A.driver;
  return`<div class="step">
    <div class="login-card">
      <div class="login-av-big" style="background:${d.color}">${d.initials}</div>
      <div class="login-name">${d.name}</div>
      <div class="login-sub">Skriv inn passordet ditt for å fortsette</div>
      <input type="password" id="pwInput" class="pw-input" placeholder="Passord" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off">
      <div class="pw-err" id="pwErr"></div>
      <div class="btn-row">
        <button class="btn btn-o" onclick="go('select')"><i class="fa-solid fa-arrow-left"></i> Tilbake</button>
        <button class="btn btn-p" onclick="doLogin()"><i class="fa-solid fa-unlock"></i> Logg inn</button>
      </div>
    </div>
  </div>`;
}

function doLogin(){
  const val=document.getElementById('pwInput')?.value||'';
  const err=document.getElementById('pwErr');
  if(val===A.driver.pw){
    err.innerHTML='';
    go('queue');
    toast(`Logget inn som ${A.driver.name} 👍`,'ok');
    startQueuePoll();
  } else {
    if(err){err.innerHTML='<i class="fa-solid fa-circle-xmark"></i> Feil passord – prøv igjen';}
    const inp=document.getElementById('pwInput');
    if(inp){inp.value='';inp.style.borderColor='var(--red)';inp.focus();setTimeout(()=>{inp.style.borderColor='';},1000);}
  }
}

/* ── QUEUE VIEW ── */
function renderQueue(){
  const data=getLS();
  const sQ=data.queues[String(A.selectedSjø)]||[];
  const discPill=(d)=>{const m={Slalom:'slalom',Trick:'trick',Hopp:'hopp',Wakeboard:'wakeboard'};return`<span class="q-disc ${m[d]||'annet'}">${d||'Annet'}</span>`;};
  return`<div class="step">
    <div class="sjø-tabs">
      ${[1,2,3].map(n=>`<div class="sjø-tab${A.selectedSjø===n?' active':''}" onclick="switchSjø(${n})">
        ${n===3?'<i class="fa-solid fa-cable-car" style="margin-right:5px"></i>':'<i class="fa-solid fa-water" style="margin-right:5px"></i>'}
        Sjø ${n}
        <span class="cnt-badge">${(data.queues[String(n)]||[]).length}</span>
      </div>`).join('')}
    </div>
    <div class="q-header">
      <h2><i class="fa-solid fa-${A.selectedSjø===3?'cable-car':'water'}" style="color:${A.selectedSjø===3?'var(--aqua)':'var(--blue)'}"></i> Sjø ${A.selectedSjø} – Kjøreliste</h2>
      <span>${sQ.length} person${sQ.length!==1?'er':''}</span>
    </div>
    ${sQ.length===0?`<div class="q-empty"><i class="fa-solid fa-water"></i><strong>Køen er tom</strong>Ingen er påmeldt Sjø ${A.selectedSjø} ennå</div>`
    :sQ.map((r,i)=>`
      <div class="q-item" onclick="confirmStart(${i})">
        <div class="q-num${i===0?' first':''}">${i+1}</div>
        <div class="q-info">
          <div class="q-name">${r.name}</div>
          <div class="q-meta" style="display:flex;align-items:center;gap:8px;margin-top:5px">${discPill(r.disc)}<span style="font-size:11.5px;color:var(--txt-s)"><i class="fa-regular fa-clock" style="margin-right:3px"></i>${r.addedAt||''}</span></div>
        </div>
        <i class="fa-solid fa-play q-arrow" style="color:var(--blue)"></i>
      </div>`).join('')}
    <div style="margin-top:24px;padding:14px 16px;background:var(--white);border-radius:var(--rs);border:1.5px solid var(--bdr);font-size:13px;color:var(--txt-s)">
      <i class="fa-solid fa-circle-info" style="color:var(--blue);margin-right:6px"></i>
      Trykk på en person for å starte turen deres. Siden oppdateres automatisk.
    </div>
  </div>`;
}

/* ── CONFIRM START MODAL ── */
function confirmStart(idx){
  const data=getLS();
  const q=data.queues[String(A.selectedSjø)]||[];
  if(!q[idx])return;
  A.confirmRider={...q[idx],idx};
  // Show modal
  const m=document.createElement('div');
  m.className='modal-bg';m.id='modalBg';
  const discColor={Slalom:'var(--blue)',Trick:'var(--purple)',Hopp:'var(--gold)',Wakeboard:'var(--aqua)'};
  const c=discColor[A.confirmRider.disc]||'var(--txt-m)';
  m.innerHTML=`
    <div class="modal">
      <div class="modal-title">Start tur?</div>
      <div class="modal-sub">Bekreft at du starter turen til:</div>
      <div class="rider-preview">
        <div class="rider-ico" style="background:${c}"><i class="fa-solid fa-person-skiing-nordic"></i></div>
        <div>
          <div style="font-size:16px;font-weight:800;color:var(--txt)">${A.confirmRider.name}</div>
          <div style="font-size:13px;color:var(--txt-s)">${A.confirmRider.disc} · Sjø ${A.selectedSjø}</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-o" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Avbryt</button>
        <button class="btn btn-green" onclick="startTrip()"><i class="fa-solid fa-play"></i> Start nå</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

function closeModal(){document.getElementById('modalBg')?.remove();}
function startTrip(){
  closeModal();
  clearInterval(A.timer);
  A.step='trip';
  A.activeRider={...A.confirmRider};
  A.tripStart=Date.now();
  A.paused=false;
  A.pauseStart=null;
  A.pausedMs=0;
  A.elapsedMs=0;
  A.showEndConfirm=false;
  bRender();
  startTimerInterval();
}

/* ── TRIP VIEW ── */
function renderTrip(){
  const fmtTime=(ms)=>{const s=Math.floor(ms/1000);const m=Math.floor(s/60);const sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;};
  const elapsed=A.elapsedMs;
  const r=A.activeRider;
  const discColor={Slalom:'var(--blue)',Trick:'var(--purple)',Hopp:'var(--gold)',Wakeboard:'var(--aqua)'};
  const c=discColor[r.disc]||'var(--navy)';
  return`<div class="step">
    <div class="trip-card">
      <div class="trip-rider-av">${r.name.split(' ').map(w=>w[0]).join('').substring(0,2)}</div>
      <div class="trip-name">${r.name}</div>
      <div class="trip-meta">
        <span style="background:rgba(0,0,0,.06);padding:3px 10px;border-radius:6px;font-weight:700;color:${c}">${r.disc}</span>
        <span style="color:var(--txt-s)">·</span>
        <span style="color:var(--txt-s)">Sjø ${A.selectedSjø}</span>
      </div>

      <div class="timer-display ${A.paused?'paused':'running'}" id="timerDisp">${fmtTime(elapsed)}</div>

      <div class="timer-state" id="timerState">
        ${A.paused
          ?'<span class="pause-dot"></span><span style="color:var(--gold)">PAUSET</span>'
          :'<span class="pulse-dot"></span><span style="color:var(--green)">KJØRER</span>'}
      </div>

      <div class="trip-btns">
        ${A.paused
          ?`<button class="btn btn-green" onclick="resumeTrip()"><i class="fa-solid fa-play"></i> Fortsett</button>`
          :`<button class="btn btn-gold" onclick="pauseTrip()"><i class="fa-solid fa-pause"></i> Pause</button>`}
        <button class="btn btn-red" onclick="toggleEndConfirm()"><i class="fa-solid fa-stop"></i> Avslutt tur</button>
      </div>

      <div class="trip-info-row">
        <div class="trip-info-chip"><i class="fa-solid fa-user-tie" style="color:var(--blue)"></i>${A.driver.name.split(' ')[0]}</div>
        <div class="trip-info-chip"><i class="fa-regular fa-clock" style="color:var(--txt-s)"></i>${new Date(A.tripStart).toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>

      ${A.showEndConfirm?`
      <div class="end-confirm">
        <p><i class="fa-solid fa-triangle-exclamation" style="color:var(--red);margin-right:6px"></i>Er du sikker på at turen skal avsluttes?</p>
        <div class="btn-row end-confirm .btn-row">
          <button class="btn btn-o" onclick="toggleEndConfirm()">Nei, fortsett</button>
          <button class="btn btn-red" onclick="endTrip()"><i class="fa-solid fa-flag-checkered"></i> Ja, avslutt</button>
        </div>
      </div>`:''}
    </div>
  </div>`;
}

/* ── DONE ── */
function renderDone(){
  const r=A.lastCompletedRider;
  const dur=A.lastDuration||0;
  const s=Math.floor(dur/1000);const m=Math.floor(s/60);const sec=s%60;
  return`<div class="step">
    <div class="done-screen">
      <div class="done-circle"><i class="fa-solid fa-flag-checkered"></i></div>
      <div style="font-size:22px;font-weight:800;color:var(--txt);margin-bottom:8px">Tur avsluttet!</div>
      <div style="font-size:15px;color:var(--txt-s);margin-bottom:4px">${r?.name||''}</div>
      <div style="font-size:13px;color:var(--txt-s);margin-bottom:28px">${r?.disc||''} · Sjø ${A.selectedSjø}</div>
      <div style="font-size:48px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--navy-mid);margin-bottom:6px">${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}</div>
      <div style="font-size:14px;color:var(--txt-s);margin-bottom:32px">Varighet</div>
      <button class="btn btn-p" style="font-size:16px;padding:14px 32px" onclick="go('queue')"><i class="fa-solid fa-list-ol"></i> Tilbake til køen</button>
    </div>
  </div>`;
}

/* ── TRIP CONTROLS ── */
function pauseTrip(){
  if(A.paused)return;
  A.paused=true;A.pauseStart=Date.now();
  bRender();startTimerInterval();
}
function resumeTrip(){
  if(!A.paused)return;
  A.pausedMs+=Date.now()-A.pauseStart;
  A.paused=false;A.pauseStart=null;
  bRender();startTimerInterval();
}
function toggleEndConfirm(){
  A.showEndConfirm=!A.showEndConfirm;
  bRender();startTimerInterval();
}

function endTrip(){
  clearInterval(A.timer);
  const dur=A.elapsedMs;
  const r=A.activeRider;

  // Remove from queue in localStorage
  const data=getLS();
  data.queues[String(A.selectedSjø)]=(data.queues[String(A.selectedSjø)]||[]).filter((_,i)=>i!==r.idx);

  // Add completed trip
  data.completedTrips.unshift({
    id:Date.now(),
    name:r.name,
    disc:r.disc,
    sjø:A.selectedSjø,
    driver:A.driver.name,
    durationMs:dur,
    date:new Date().toLocaleDateString('no-NO'),
    time:new Date().toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'})
  });
  setLS(data);

  A.lastCompletedRider={...r};
  A.lastDuration=dur;
  A.activeRider=null;
  A.showEndConfirm=false;
  go('done');
  toast('✅ Tur registrert i systemet!','ok',4000);
}

function startTimerInterval(){
  clearInterval(A.timer);
  if(A.step!=='trip')return;
  A.timer=setInterval(()=>{
    if(!A.paused){
      A.elapsedMs=Date.now()-A.tripStart-A.pausedMs;
    }
    // Update only timer display for performance
    const d=document.getElementById('timerDisp');
    const st=document.getElementById('timerState');
    if(d){
      const ms=A.elapsedMs;
      const s=Math.floor(ms/1000);const m=Math.floor(s/60);const sec=s%60;
      d.textContent=`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      d.className='timer-display '+(A.paused?'paused':'running');
    }
    if(st){
      st.innerHTML=A.paused
        ?'<span class="pause-dot"></span><span style="color:var(--gold)">PAUSET</span>'
        :'<span class="pulse-dot"></span><span style="color:var(--green)">KJØRER</span>';
    }
  },500);
}

/* ── QUEUE POLLING ── */
let _pollInterval=null;
function startQueuePoll(){
  clearInterval(_pollInterval);
  _pollInterval=setInterval(()=>{
    if(A.step==='queue'){
      const app=document.getElementById('app');
      if(app)app.innerHTML=renderQueue();
    }
    updateBadgesInTabs();
  },3000);
}

function updateBadgesInTabs(){
  if(A.step!=='queue')return;
  const data=getLS();
  [1,2,3].forEach(n=>{
    const tabs=document.querySelectorAll('.sjø-tab');
    // Will re-render naturally via poll
  });
}

function switchSjø(n){
  A.selectedSjø=n;
  bRender();
  startQueuePoll();
}

/* ── LOGOUT ── */
function confirmLogout(){
  if(A.step==='trip'){toast('Avslutt pågående tur først','err');return;}
  if(confirm('Logg ut?')){
    clearInterval(A.timer);clearInterval(_pollInterval);
    A.driver=null;A.activeRider=null;
    go('select');
    toast('Logget ut','info');
  }
}

/* ── TOAST ── */
function toast(msg,type='ok',dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className='toast '+type;},dur);
}

/* ── AFTER RENDER ── */
function afterRender(){
  if(A.step==='login'){setTimeout(()=>document.getElementById('pwInput')?.focus(),80);}
  if(A.step==='trip'){startTimerInterval();}
}

/* ── INIT ── */
bRender();
</script>
</body>
</html>
